<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="400" id="tracks-paper">

<defs>

  <g id="background">
    <rect width="100%" height="100%" fill="none" stroke="slategrey" stroke-opacity="1" stroke-width="5"/>
  </g>

  <marker id="Talon" markerWidth="3" markerHeight="1" refX="0" refY="0.5" orient="auto">
    <path stroke-width="0.1" style="fill:midnightblue; fill-opacity:0.6; stroke-opacity:0.3;              stroke:black; stroke-linejoin:miter" d="M 2.5 0.5 C 0 1.5 0 -0.5 2.5 0.5 z"/>
  </marker>

  <g id="leftclaw" stroke="black" fill="none" stroke-opacity="0.6" marker-end="url(#Talon)" stroke-dasharray="6 15" stroke-linecap="round">
    <path d="M 0 15 l 5 75" stroke-width="16"/>
    
    <path d="M 0 0 l 0 -75" stroke-width="16"/>
    
    <path d="M -12 5 l -40 -50" stroke-width="14"/>
    
    <path d="M 12 5 l 40 -50" stroke-width="14"/>
  </g>

  <g id="rightclaw" stroke="black" fill="none" stroke-opacity="0.6" marker-end="url(#Talon)" stroke-dasharray="6 15" stroke-linecap="round">
    <path d="M 0 15 l -5 75" stroke-width="16"/>
    
    <path d="M 0 0 l 0 -75" stroke-width="16"/>
    
    <path d="M -12 5 l -40 -50" stroke-width="14"/>
    
    <path d="M 12 5 l 40 -50" stroke-width="14"/>
  </g>
  
  
  <g id="trackrow" fill="black" stroke="none" stroke-linecap="round">
    <use xlink:href="#backtrack" x="-20"/>
    <use xlink:href="#track" x="20"/>
    <use xlink:href="#backtrack" x="60"/>
    <use xlink:href="#track" x="100"/>
    <use xlink:href="#backtrack" x="140"/>
    <use xlink:href="#track" x="180"/>
    <use xlink:href="#backtrack" x="220"/>
    <use xlink:href="#track" x="260"/>
    <use xlink:href="#backtrack" x="300"/>
    <use xlink:href="#track" x="340"/>
    <use xlink:href="#backtrack" x="380"/>
    <use xlink:href="#track" x="420"/>
    <use xlink:href="#backtrack" x="460"/>
    <use xlink:href="#track" x="500"/>
    <use xlink:href="#backtrack" x="540"/>
    <use xlink:href="#track" x="580"/>
    <use xlink:href="#backtrack" x="620"/>
    <use xlink:href="#track" x="660"/>
    <use xlink:href="#backtrack" x="700"/>
    <use xlink:href="#track" x="740"/>
    <use xlink:href="#backtrack" x="780"/>
  </g>
  
  
  
  <g id="track" stroke="black" fill="none" stroke-width="2" transform="scale(0.3) rotate(35)">
    <path d="M 0 10 v -25"/>
    <path d="M 0 0 v -15" transform="rotate(-35)"/>
    <path d="M 0 0 v -15" transform="rotate(35)"/>
  </g>
  
  <g id="backtrack" stroke="black" fill="none" stroke-width="2"
    transform="scale(0.3) rotate(-35)">
    <path d="M 0 10 v -25"/>
    <path d="M 0 0 v -15" transform="rotate(-35)"/>
    <path d="M 0 0 v -15" transform="rotate(35)"/>
  </g>
  
</defs>
 
 
 
  <!--<use xlink:href="#leftclaw" transform="translate(700 320) scale(0.45)"/>
  
  <use xlink:href="#rightclaw" transform="translate(760 300) scale(0.45)  rotate(-18)"/>-->
  
 <rect width="100%" height="100%" fill="white" fill-opacity="0.7"/>
  
 <g stroke="black" stroke-width="1" transform="translate(0 25)">
   
   <use xlink:href="#trackrow" x="0" y="0"/>
   <use xlink:href="#trackrow" x="40" y="40"/>
   <use xlink:href="#trackrow" x="0" y="80"/>
   <use xlink:href="#trackrow" x="40" y="120"/>
   <use xlink:href="#trackrow" x="0" y="160"/>
   <use xlink:href="#trackrow" x="40" y="200"/>
   <use xlink:href="#trackrow" x="0" y="240"/>
   <use xlink:href="#trackrow" x="40" y="280"/>
   <use xlink:href="#trackrow" x="0" y="320"/>
   <use xlink:href="#trackrow" x="40" y="360"/>
   
    <!--<g stroke-dasharray="1 5">
      <path d="M 0 50 h 800"/>
      <path d="M 0 100 h 800"/>
      <path d="M 0 150 h 800"/>
      <path d="M 0 200 h 800"/>
      <path d="M 0 250 h 800"/>
      <path d="M 0 300 h 800"/>
      <path d="M 0 350 h 800"/>
    </g>-->
 </g>
</svg>